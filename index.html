<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teachable Machine</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --accent: #7c6dfa;
      --accent2: #fa6d9a;
      --text: #e8e8f0;
      --muted: #5a5a7a;
      --success: #6dfaaa;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      z-index: 0;
      pointer-events: none;
    }
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }
    header { text-align: center; }
    .tag {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 4px 12px;
      border-radius: 2px;
      margin-bottom: 14px;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
      letter-spacing: 1px;
    }
    .btn {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: transparent;
      color: var(--accent);
      border: 1.5px solid var(--accent);
      padding: 14px 36px;
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color 0.2s, box-shadow 0.2s;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      z-index: 0;
    }
    .btn:hover::before { transform: translateX(0); }
    .btn:hover { color: var(--bg); box-shadow: 0 0 24px rgba(124,109,250,0.4); }
    .btn span { position: relative; z-index: 1; }
    .result-wrap {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .result-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #result {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800;
      color: var(--success);
      letter-spacing: -0.5px;
      transition: all 0.2s;
      text-shadow: 0 0 20px rgba(109,250,170,0.3);
    }
    #result.loading { color: var(--accent); text-shadow: 0 0 20px rgba(124,109,250,0.3); }
    #result.error { color: var(--accent2); font-size: 1rem; text-shadow: none; }
    .webcam-wrap {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
      width: 300px;
      height: 300px;
    }
    .webcam-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      box-shadow: inset 0 0 40px rgba(124,109,250,0.08);
      pointer-events: none;
      z-index: 2;
    }
    .webcam-wrap::before {
      content: '';
      position: absolute;
      top: 10px; left: 10px;
      width: 20px; height: 20px;
      border-top: 2px solid var(--accent);
      border-left: 2px solid var(--accent);
      z-index: 3;
    }
    #webcam-container canvas {
      width: 300px !important;
      height: 300px !important;
      display: block;
    }
    @keyframes scan {
      0% { top: 0; opacity: 0.6; }
      100% { top: 100%; opacity: 0; }
    }
    .scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      z-index: 4;
      animation: scan 2s linear infinite;
      display: none;
    }
    .scan-line.active { display: block; }
    .labels-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .label-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
    }
    .label-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .label-name {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 1px;
      color: var(--text);
      text-transform: uppercase;
    }
    .label-pct {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--accent);
      font-weight: 700;
    }
    .bar-track {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.12s ease;
      width: 0%;
    }
    footer {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="tag">AI · Real-time</div>
    <h1>Teachable<br>Machine</h1>
    <p class="subtitle">// gesture recognition · tensorflow.js</p>
  </header>
  <button class="btn" onclick="init()"><span>Start Camera</span></button>
  <div class="result-wrap">
    <span class="result-label">Detecting</span>
    <span id="result" class="loading">Press Start</span>
  </div>
  <div class="webcam-wrap">
    <div class="scan-line" id="scan-line"></div>
    <div id="webcam-container"></div>
  </div>
  <div class="labels-wrap" id="label-container"></div>
  <footer>Built with Teachable Machine + TensorFlow.js</footer>
</div>
<script src="app.js"></script>
</body>
</html>
